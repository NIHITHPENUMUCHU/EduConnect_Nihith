<div class="card auth-card">
  <h2 class="title">Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-group">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        class="form-control"
        formControlName="username"
        placeholder="Enter username"
      />
      <div class="error" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
        <small *ngIf="loginForm.get('username')?.errors?.['required']">Username is required.</small>
        <small *ngIf="loginForm.get('username')?.errors?.['pattern']">Only letters and numbers allowed.</small>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        class="form-control"
        formControlName="password"
        placeholder="Enter password"
      />
      <div class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        <small *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</small>
        <small *ngIf="loginForm.get('password')?.errors?.['minlength']">Minimum 8 characters.</small>
        <small *ngIf="loginForm.get('password')?.errors?.['pattern']">
          Must contain at least one capital letter and one number.
        </small>
      </div>
    </div>

    <button class="btn btn-primary" type="submit" [disabled]="loginForm.invalid">Login</button>
  </form>

  <p class="mt">
    New user? <a routerLink="/auth/register">Register here</a>
  </p>

  <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>
</div>
